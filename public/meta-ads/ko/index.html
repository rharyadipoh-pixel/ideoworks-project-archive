<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인도네시아 시장 진출 · Meta 광고 크리에이티브 · Ideoworks</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--red:#E8192C;--navy:#0D1B2A;--bg:#080A10;--surface:#0F1320;--rule:#1E2535;--rule2:#2D2A3A;--text:#F2F0EC;--muted:#8E8A9A;--fd:'Noto Sans KR',sans-serif;--fb:'Noto Sans KR',sans-serif;--fm:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
  .wrap{max-width:1100px;margin:0 auto;padding:0 44px}
  .hdr{padding:28px 0 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--rule);margin-bottom:44px}
  .hdr-logo{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--text)}
  .hdr-logo b{color:var(--red)}
  .hdr-tag{font-family:var(--fm);font-size:9px;color:rgba(232,25,44,.65);letter-spacing:.14em;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(232,25,44,.2)}
  .sec{margin-bottom:52px}
  .sec-title{font-family:var(--fd);font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px;padding-bottom:12px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:10px}
  .sec-title::before{content:'';display:block;width:18px;height:1px;background:var(--red)}
  .grid{display:flex;gap:14px;flex-wrap:wrap}
  .card{padding:20px 22px;background:var(--surface);border:1px solid var(--rule2);border-radius:6px;display:flex;flex-direction:column;gap:8px;min-width:200px}
  .card-label{font-family:var(--fm);font-size:8px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
  .card-name{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--text)}
  .card-link{margin-top:4px;display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--red);color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;text-decoration:none;letter-spacing:.06em;align-self:flex-start}
  .ftr{border-top:1px solid var(--rule);padding:22px 0;display:flex;align-items:center;justify-content:space-between;margin-top:20px}
  .ftr-logo{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(242,240,236,.2)}
  .ftr-logo b{color:var(--red)}
  .ftr-meta{font-family:var(--fm);font-size:8px;color:var(--muted);letter-spacing:.12em}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">IDEO<b>WORKS</b></div>
    <div class="hdr-tag">인도네시아 시장 진출 · 한국어 버전</div>
  </div>
  <div class="sec">
    <div class="sec-title">릴스 + 스토리 · 9:16 · 애니메이션</div>
    <div class="grid">
      <div class="card"><div class="card-label">앵글 A</div><div class="card-name">인도네시아는 기다려주지 않습니다</div><a class="card-link" href="reel-a.html" target="_blank">열기 ↗</a></div>
      <div class="card"><div class="card-label">앵글 B</div><div class="card-name">성공한 브랜드의 공통점</div><a class="card-link" href="reel-b.html" target="_blank">열기 ↗</a></div>
      <div class="card"><div class="card-label">앵글 C</div><div class="card-name">잘못된 시장을 위한 준비</div><a class="card-link" href="reel-c.html" target="_blank">열기 ↗</a></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">캐러셀 · 1:1 · 6장</div>
    <div class="grid">
      <div class="card"><div class="card-label">앵글 A</div><div class="card-name">인도네시아는 고유한 규칙으로 운영됩니다</div><a class="card-link" href="carousel-a.html" target="_blank">열기 ↗</a></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">스태틱 피드</div>
    <div class="grid">
      <div class="card"><div class="card-label">4:5 리타게팅</div><div class="card-name">전체 그림은 당신의 것입니다</div><a class="card-link" href="static-retargeting.html" target="_blank">열기 ↗</a></div>
      <div class="card"><div class="card-label">1:1 인지도</div><div class="card-name">성공하는 브랜드는 이것을 먼저 압니다</div><a class="card-link" href="static-awareness.html" target="_blank">열기 ↗</a></div>
    </div>
  </div>
  <div class="ftr">
    <div class="ftr-logo">IDEO<b>WORKS</b> · Meta 크리에이티브</div>
    <div class="ftr-meta">한국어 · 3 릴스 · 1 캐러셀 · 2 스태틱</div>
  </div>
</div>
</body>
</html>
