<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Static Retargeting 4:5 · 인도네시아 시장 진출 · Ideoworks</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--red:#E8192C;--navy:#0D1B2A;--white:#FFFFFF;--fd:'Noto Sans KR',sans-serif;--fb:'Noto Sans KR',sans-serif;--fm:'JetBrains Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060608;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:14px}
  .fmt{font-family:var(--fm);font-size:10px;color:#5C5867;letter-spacing:.2em;text-transform:uppercase}
  .ad{width:432px;height:540px;background:var(--red);position:relative;overflow:hidden;border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,.5);display:flex;flex-direction:column;padding:0}
  .noise{position:absolute;inset:0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:1}
  .bg-text{position:absolute;bottom:-30px;right:-15px;font-family:var(--fm);font-size:180px;color:rgba(255,255,255,.06);line-height:1;letter-spacing:-.05em;pointer-events:none;z-index:1}
  .hdr{padding:22px 28px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2}
  .brand{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--white)}
  .hdr-tag{font-family:var(--fm);font-size:8px;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid rgba(255,255,255,.25)}
  .main{flex:1;display:flex;flex-direction:column;padding:0 28px;position:relative;z-index:2}
  .hl{font-family:var(--fd);font-size:38px;font-weight:900;color:var(--white);line-height:1.05;letter-spacing:-.02em;margin-bottom:16px}
  .sub{font-family:var(--fb);font-size:12px;color:rgba(255,255,255,.75);line-height:1.7;max-width:28ch;margin-bottom:20px}
  .lp-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end}
  .lp-label{font-family:var(--fm);font-size:8px;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
  .lp-device{background:#0A0D14;border-radius:8px 8px 0 0;padding:16px 18px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.1);border-bottom:none}
  .lp-device::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(240,242,245,.5) 1px,transparent 1px);background-size:18px 18px;opacity:.025;pointer-events:none}
  .lp-top{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),#FFB347)}
  .lp-top-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
  .lp-domain{font-family:var(--fm);font-size:8px;color:rgba(255,255,255,.25);margin-bottom:3px;letter-spacing:.08em}
  .lp-score{font-family:var(--fm);font-size:52px;color:#F2F0EC;letter-spacing:-.04em;line-height:1}
  .lp-score span{font-size:17px;color:rgba(255,255,255,.25)}
  .lp-tag{padding:4px 8px;border:1px solid rgba(232,25,44,.25);font-family:var(--fm);font-size:8px;color:rgba(232,25,44,.6);letter-spacing:.1em;text-transform:uppercase;align-self:flex-start}
  .lp-rows{display:flex;flex-direction:column;gap:5px}
  .lp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04)}
  .lp-key{font-family:var(--fm);font-size:8px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em}
  .lp-val{font-family:var(--fm);font-size:9px;color:rgba(255,255,255,.2)}
  .foot{background:var(--navy);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2}
  .foot-url{display:flex;flex-direction:column;gap:2px}
  .foot-url-main{font-family:var(--fm);font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.08em}
  .foot-url-sub{font-family:var(--fm);font-size:7.5px;color:rgba(255,255,255,.3);letter-spacing:.08em}
  .foot-btn{padding:10px 20px;background:var(--white);color:var(--red);font-family:var(--fd);font-weight:700;font-size:11px;letter-spacing:.06em}
</style>
</head>
<body>
<div class="fmt">FEED STATIC · 4:5 · RETARGETING · IDEOWORKS BRAND</div>
<div class="ad">
  <div class="noise"></div>
  <div class="bg-text">74</div>
  <div class="hdr">
    <div class="brand">IDEOWORKS</div>
    <div class="hdr-tag">점수를 확인하셨군요</div>
  </div>
  <div class="main">
    <div class="hl">전체 그림은<br>당신의<br>것입니다.</div>
    <div class="sub">페르소나 맵, GTM 블루프린트, 실제 인도네시아 예산 티어. 무료. 90초 이내.</div>
    <div class="lp-wrap">
      <div class="lp-label">당신의 점수. 잠긴 브리핑.</div>
      <div class="lp-device">
        <div class="lp-top"></div>
        <div class="lp-top-row">
          <div><div class="lp-domain">yourbrand.com</div><div class="lp-score">74<span>/100</span></div></div>
          <div class="lp-tag">부분 보기</div>
        </div>
        <div class="lp-rows">
          <div class="lp-row"><span class="lp-key">페르소나 매핑. 2개 프로필.</span><span class="lp-val">🔒</span></div>
          <div class="lp-row"><span class="lp-key">GTM 전략. 90일 계획.</span><span class="lp-val">🔒</span></div>
          <div class="lp-row"><span class="lp-key">예산 프레임워크. 3등급.</span><span class="lp-val">🔒</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="foot">
    <div class="foot-url">
      <div class="foot-url-sub">무료. 90초 이내 전달.</div>
    </div>
    <div class="foot-btn">브리핑 잠금해제</div>
  </div>
</div>
</body>
</html>
