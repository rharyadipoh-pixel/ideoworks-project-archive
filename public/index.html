<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideoworks Project Archive — Claude Code</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E5002B; --red-light: #FFF0F3;
    --gray-100: #F8F8F8; --gray-200: #EEEEEE;
    --gray-400: #AAAAAA; --gray-600: #666666; --gray-800: #222222;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }
  body { font-family: var(--font); background: #fff; color: var(--gray-800); min-height: 100vh; }

  .header {
    background: #fff; border-bottom: 3px solid var(--red);
    padding: 22px 40px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 36px; height: 36px; background: var(--red); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 14px; letter-spacing: -0.5px;
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--red); }
  .header-meta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .header-right { font-size: 12px; color: var(--gray-400); text-align: right; }
  .header-right strong { color: var(--gray-800); display: block; font-size: 13px; }

  .stats-bar {
    background: var(--gray-100); border-bottom: 1px solid var(--gray-200);
    padding: 14px 40px; display: flex; gap: 32px; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; color: var(--red); }
  .stat-label { font-size: 11px; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  .controls {
    padding: 18px 40px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--gray-200); background: #fff;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-400); }
  #search {
    width: 100%; padding: 8px 10px 8px 34px;
    border: 1.5px solid var(--gray-200); border-radius: 8px;
    font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--red); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border: 1.5px solid var(--gray-200); background: #fff;
    border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: var(--gray-600); font-family: var(--font);
  }
  .filter-btn:hover { border-color: var(--red); color: var(--red); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
  .count-label { margin-left: auto; font-size: 12px; color: var(--gray-400); white-space: nowrap; }

  .grid-wrap { padding: 28px 40px; }
  .section { margin-bottom: 8px; }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--gray-400); font-weight: 700; margin-bottom: 14px; margin-top: 28px;
    padding-bottom: 6px; border-bottom: 1px solid var(--gray-200);
  }
  .section:first-child .section-label { margin-top: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }

  .card {
    border: 1.5px solid var(--gray-200); border-radius: 12px; padding: 18px;
    background: #fff; transition: all 0.2s; display: flex; flex-direction: column; gap: 10px;
  }
  .card:hover { border-color: var(--red); box-shadow: 0 4px 16px rgba(229,0,43,0.08); transform: translateY(-2px); }
  .card.hidden { display: none; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-icon { font-size: 22px; flex-shrink: 0; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  }
  .badge-app      { background: #E8F5FF; color: #0066CC; }
  .badge-html     { background: #FFF3E0; color: #E65100; }
  .badge-campaign { background: var(--red-light); color: var(--red); }
  .badge-tool     { background: #F3FFE8; color: #2E7D32; }

  .card-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .card-desc { font-size: 12px; color: var(--gray-600); line-height: 1.5; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-date { font-size: 11px; color: var(--gray-400); }
  .card-link {
    font-size: 11px; font-weight: 700; color: var(--red); text-decoration: none;
    padding: 4px 10px; border: 1.5px solid var(--red); border-radius: 6px; transition: all 0.15s;
  }
  .card-link:hover { background: var(--red); color: #fff; }

  .sub-links { display: flex; gap: 6px; flex-wrap: wrap; }
  .sub-link {
    font-size: 10px; font-weight: 600; color: var(--gray-600); text-decoration: none;
    padding: 3px 8px; border: 1px solid var(--gray-200); border-radius: 4px; transition: all 0.15s;
  }
  .sub-link:hover { border-color: var(--red); color: var(--red); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); display: none; }
  .empty-state p { font-size: 14px; margin-top: 12px; }

  .footer {
    margin-top: 40px; padding: 20px 40px; border-top: 1px solid var(--gray-200);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-left { font-size: 12px; color: var(--gray-400); }
  .footer-logo { font-size: 12px; font-weight: 700; color: var(--red); }

  @media (max-width: 600px) {
    .header, .controls, .stats-bar, .grid-wrap, .footer { padding-left: 16px; padding-right: 16px; }
    .header { flex-direction: column; gap: 10px; align-items: flex-start; }
    .stats-bar { gap: 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">IDW</div>
    <div>
      <h1>Ideoworks <span>Project Archive</span></h1>
      <div class="header-meta">Claude Code sessions · Ryan Haryadi</div>
    </div>
  </div>
  <div class="header-right">
    <strong>account@ideoworks.co.id</strong>
    <span id="last-updated">Loading…</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-num" id="stat-app">—</div><div class="stat-label">Apps</div></div>
  <div class="stat"><div class="stat-num" id="stat-html">—</div><div class="stat-label">HTML</div></div>
  <div class="stat"><div class="stat-num" id="stat-campaign">—</div><div class="stat-label">Campaign</div></div>
  <div class="stat"><div class="stat-num" id="stat-tool">—</div><div class="stat-label">Tools</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search projects…">
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="app">Apps</button>
    <button class="filter-btn" data-filter="html">HTML</button>
    <button class="filter-btn" data-filter="campaign">Campaign</button>
    <button class="filter-btn" data-filter="tool">Tools</button>
  </div>
  <div class="count-label" id="count-label"></div>
</div>

<div class="grid-wrap" id="grid-wrap"></div>

<div class="empty-state" id="empty-state">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <p>No projects match your search.</p>
</div>

<footer class="footer">
  <div class="footer-left">Ideoworks Project Archive · Claude Code Sessions · account@ideoworks.co.id</div>
  <div class="footer-logo">Ideoworks — Creativity is Everywhere</div>
</footer>

<script>
const SECTIONS = {
  app:      'Apps & Builders',
  html:     'HTML Deliverables',
  campaign: 'Meta Ads Creatives',
  tool:     'Tools & Guides'
};

const BADGE_LABELS = { app: 'App', html: 'HTML', campaign: 'Campaign', tool: 'Guide' };

let allProjects = [];
let activeFilter = 'all';

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function buildCard(p) {
  const sublinksHtml = p.sublinks
    ? `<div class="sub-links">${p.sublinks.map(s => `<a href="${s.url}" class="sub-link">${s.label}</a>`).join('')}</div>`
    : '';

  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.type = p.type;
  el.dataset.tags = (p.tags || []).join(' ') + ' ' + p.name + ' ' + p.desc;
  el.innerHTML = `
    <div class="card-top">
      <span class="card-icon">${p.icon}</span>
      <span class="badge badge-${p.type}">${BADGE_LABELS[p.type] || p.type}</span>
    </div>
    <div class="card-name">${p.name}</div>
    <div class="card-desc">${p.desc}</div>
    <div class="card-footer">
      <span class="card-date">${formatDate(p.date)}</span>
      <a href="${p.url}" class="card-link">Open →</a>
    </div>
    ${sublinksHtml}
  `;
  return el;
}

function render() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';

  const grouped = {};
  let visible = 0;

  allProjects.forEach(p => {
    const matchFilter = activeFilter === 'all' || p.type === activeFilter;
    const searchable = (p.tags || []).join(' ') + ' ' + p.name + ' ' + p.desc;
    const matchSearch = !term || searchable.toLowerCase().includes(term);
    if (!matchFilter || !matchSearch) return;

    if (!grouped[p.type]) grouped[p.type] = [];
    grouped[p.type].push(p);
    visible++;
  });

  const order = ['app', 'html', 'campaign', 'tool'];
  order.forEach(type => {
    if (!grouped[type]) return;
    const section = document.createElement('div');
    section.className = 'section';
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = SECTIONS[type] || type;
    const grid = document.createElement('div');
    grid.className = 'grid';
    grouped[type].forEach(p => grid.appendChild(buildCard(p)));
    section.appendChild(label);
    section.appendChild(grid);
    wrap.appendChild(section);
  });

  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('count-label').textContent =
    visible === allProjects.length ? `${allProjects.length} projects` : `${visible} of ${allProjects.length}`;
}

function updateStats() {
  const count = t => allProjects.filter(p => p.type === t).length;
  document.getElementById('stat-total').textContent = allProjects.length;
  document.getElementById('stat-app').textContent = count('app');
  document.getElementById('stat-html').textContent = count('html');
  document.getElementById('stat-campaign').textContent = count('campaign');
  document.getElementById('stat-tool').textContent = count('tool');

  const latest = allProjects.map(p => p.date).sort().pop();
  if (latest) {
    document.getElementById('last-updated').textContent = 'Updated: ' + formatDate(latest);
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});
document.getElementById('search').addEventListener('input', render);

fetch('/api/projects')
  .then(r => r.json())
  .then(data => {
    allProjects = data.sort((a, b) => b.date.localeCompare(a.date));
    updateStats();
    render();
  })
  .catch(() => {
    document.getElementById('grid-wrap').innerHTML =
      '<p style="color:#aaa;padding:40px;text-align:center">Failed to load projects.</p>';
  });
</script>
</body>
</html>
